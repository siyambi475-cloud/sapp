<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Manage Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 font-sans p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-8">
        
        <div class="bg-white p-6 md:p-8 rounded-3xl border border-gray-200 shadow-xl max-w-md mx-auto">
            <h2 class="text-2xl font-extrabold text-indigo-700 text-center mb-6 uppercase tracking-wider">ADD NEW VIDEO (FIREBASE)</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">ভিডিওর টাইটেল</label>
                    <input type="text" id="title" placeholder="যেমন: নতুন বাংলা মুভি" class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300 outline-none focus:ring-2 focus:ring-indigo-600 text-gray-900">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">ভিডিও লিংক (YouTube/Facebook/Shorts)</label>
                    <input type="text" id="url" placeholder="লিংকটি এখানে পেস্ট করুন" class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300 outline-none focus:ring-2 focus:ring-indigo-600 text-gray-900">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">থাম্বনেইল লিংক (.jpg বা .png)</label>
                    <input type="text" id="thumbnail" placeholder="https://i.postimg.cc/..." class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300 outline-none focus:ring-2 focus:ring-indigo-600 text-gray-900">
                </div>

                <button onclick="uploadVideo()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold text-white text-lg hover:bg-indigo-700 transition active:scale-95 shadow-lg shadow-indigo-500/20">ভিডিও আপলোড করুন</button>
                
                <p id="success-msg" class="text-center text-green-600 font-bold text-sm hidden">🎉 ভিডিও সফলভাবে আপলোড হয়েছে!</p>
            </div>
        </div>

        <div class="bg-white p-6 md:p-8 rounded-3xl border border-gray-200 shadow-xl">
            <h3 class="text-xl font-extrabold text-gray-800 mb-4 border-b pb-2">মোট আপলোড করা ভিডিওর তালিকা</h3>
            
            <div id="loading-text" class="text-center py-4 text-gray-500 font-medium">ভিডিওর তালিকা লোড হচ্ছে...</div>
            
            <div id="admin-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
        </div>

    </div>

    <script>
        // --- ফায়ারবেস কনফিগারেশন ---
        const firebaseConfig = {
          apiKey: "AIzaSyBiVxBxExXHd2OqWa5LqZNE5a2t-6j1n9Y",
          authDomain: "sapp-38df8.firebaseapp.com",
          databaseURL: "https://sapp-38df8-default-rtdb.firebaseio.com",
          projectId: "sapp-38df8",
          storageBucket: "sapp-38df8.firebasestorage.app",
          messagingSenderId: "335406842966",
          appId: "1:335406842966:web:1cccf3395fb3e11460a7f7"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ১. ভিডিও আপলোড করার ফাংশন
        function uploadVideo() {
            const title = document.getElementById('title').value.trim();
            const url = document.getElementById('url').value.trim();
            const thumbnail = document.getElementById('thumbnail').value.trim();
            const successMsg = document.getElementById('success-msg');

            if (!title || !url) {
                alert("দয়া করে টাইটেল এবং ভিডিও লিংক অবশ্যই দিন!");
                return;
            }

            // ফায়ারবেসের জন্য ইউনিক আইডি জেনারেট করা
            const videoId = Date.now().toString();

            // ফায়ারবেস ডেটাবেজের 'videos' নোডের আন্ডারে ইউনিক আইডি দিয়ে পুশ করা হচ্ছে
            database.ref('videos/' + videoId).set({
                id: videoId,
                title: title,
                url: url,
                thumbnail: thumbnail || 'https://via.placeholder.com/400x225'
            }).then(() => {
                successMsg.classList.remove('hidden');
                // ইনপুট বক্সগুলো খালি করে দেওয়া
                document.getElementById('title').value = '';
                document.getElementById('url').value = '';
                document.getElementById('thumbnail').value = '';
                
                setTimeout(() => { successMsg.classList.add('hidden'); }, 3000);
            }).catch((error) => {
                alert("আপলোড করতে সমস্যা হয়েছে: " + error.message);
            });
        }

        // ২. ফায়ারবেস থেকে রিয়েলটাইম ডেটা নিয়ে এসে তালিকা দেখানোর ফাংশন
        database.ref('videos').on('value', (snapshot) => {
            const grid = document.getElementById('admin-grid');
            const loadingText = document.getElementById('loading-text');
            grid.innerHTML = ""; // আগের লিস্ট ক্লিয়ার করা
            
            const data = snapshot.val();
            
            if (data) {
                loadingText.classList.add('hidden');
                
                // ডেটা অবজেক্টকে লুপ চালিয়ে ইন্টারফেসে দেখানো
                Object.keys(data).forEach((key) => {
                    const video = data[key];
                    
                    const card = `
                        <div class="bg-gray-50 p-3 rounded-2xl border border-gray-200 flex flex-col justify-between shadow-sm">
                            <div>
                                <img src="${video.thumbnail}" class="w-full aspect-video object-cover rounded-xl mb-2">
                                <h4 class="text-sm font-bold text-gray-800 line-clamp-2 leading-5 mb-3">${video.title}</h4>
                            </div>
                            <button onclick="deleteVideo('${key}')" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2 rounded-xl text-xs transition active:scale-95 shadow-md">
                                ডিলিট করুন 🗑️
                            </button>
                        </div>
                    `;
                    // নতুন ভিডিও সবার উপরে দেখানোর জন্য জইন করা
                    grid.insertAdjacentHTML('afterbegin', card);
                });
            } else {
                loadingText.classList.remove('hidden');
                loadingText.innerText = "বর্তমানে ডেটাবেজে কোনো ভিডিও নেই!";
            }
        });

        // ৩. ফায়ারবেস থেকে ভিডিও ডিলিট করার ফাংশন
        function deleteVideo(key) {
            if (confirm("আপনি কি নিশ্চিত যে এই ভিডিওটি ডিলিট করতে চান?")) {
                database.ref('videos/' + key).remove()
                .then(() => {
                    alert("ভিডিওটি সফলভাবে ডিলিট করা হয়েছে!");
                })
                .catch((error) => {
                    alert("ডিলিট করা যায়নি: " + error.message);
                });
            }
        }
    </script>
</body>
</html>
