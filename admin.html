<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Manage Videos & Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 font-sans p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-xl">
                <h2 class="text-xl font-extrabold text-indigo-700 text-center mb-4 uppercase tracking-wider">ADD NEW VIDEO</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">ভিডিওর টাইটেল</label>
                        <input type="text" id="title" placeholder="যেমন: নতুন বাংলা মুভি" class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300 outline-none text-sm text-gray-900">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">ভিডিও লিংক</label>
                        <input type="text" id="url" placeholder="লিংকটি এখানে পেস্ট করুন" class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300 outline-none text-sm text-gray-900">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">থাম্বনেইল লিংক</label>
                        <input type="text" id="thumbnail" placeholder="https://i.postimg.cc/..." class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300 outline-none text-sm text-gray-900">
                    </div>
                    <button onclick="uploadVideo()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold text-white hover:bg-indigo-700 transition active:scale-95 shadow-md">ভিডিও আপলোড করুন</button>
                    <p id="success-msg" class="text-center text-green-600 font-bold text-xs hidden">🎉 ভিডিও সফলভাবে আপলোড হয়েছে!</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-xl flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-extrabold text-red-600 text-center mb-4 uppercase tracking-wider">📢 SEND PUSH NOTIFICATION (ONESIGNAL)</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">নোটিফিকেশন টাইটেল</label>
                            <input type="text" id="notif-title" placeholder="যেমন: নতুন পর্ব আপলোড হয়েছে!" class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300 outline-none text-sm text-gray-900">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">নোটিফিকেশন মেসেজ</label>
                            <textarea id="notif-body" placeholder="যেমন: এখনই ক্লিক করে সবার আগে সিরিয়ালটি দেখে নিন..." class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300 outline-none text-sm text-gray-900 h-20"></textarea>
                        </div>
                    </div>
                </div>
                <button onclick="sendNotification()" class="w-full bg-red-500 py-3 rounded-xl font-bold text-white hover:bg-red-600 transition active:scale-95 shadow-md mt-4">সবাইকে নোটিফিকেশন পাঠান 🚀</button>
            </div>
        </div>

        <div class="bg-white p-6 md:p-8 rounded-3xl border border-gray-200 shadow-xl">
            <h3 class="text-xl font-extrabold text-gray-800 mb-4 border-b pb-2">মোট আপলোড করা ভিডিওর তালিকা</h3>
            <div id="loading-text" class="text-center py-4 text-gray-500 font-medium">ভিডিওর তালিকা লোড হচ্ছে...</div>
            <div id="admin-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
        </div>

    </div>

    <script>
        // --- ফায়ারবেস কনফিগারেশন ---
        const firebaseConfig = {
          apiKey: "AIzaSyBiVxBxExXHd2OqWa5LqZNE5a2t-6j1n9Y",
          authDomain: "sapp-38df8.firebaseapp.com",
          databaseURL: "https://sapp-38df8-default-rtdb.firebaseio.com",
          projectId: "sapp-38df8",
          storageBucket: "sapp-38df8.firebasestorage.app",
          messagingSenderId: "335406842966",
          appId: "1:335406842966:web:1cccf3395fb3e11460a7f7"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- ওয়ানসিগন্যাল কনফিগারেশন ---
        const ONESIGNAL_APP_ID = "fe7cc546-1862-48be-8a0a-3ac808bec2e5";
        
        // ⚠️ আপনার OneSignal ড্যাশবোর্ড (Settings -> API Keys) থেকে "REST API Key" টি নিয়ে নিচের লাইনে বসান।
        const ONESIGNAL_REST_KEY = "YOUR_ONESIGNAL_REST_API_KEY_HERE"; 

        // ১. ভিডিও আপলোড
        function uploadVideo() {
            const title = document.getElementById('title').value.trim();
            const url = document.getElementById('url').value.trim();
            const thumbnail = document.getElementById('thumbnail').value.trim();
            const successMsg = document.getElementById('success-msg');

            if (!title || !url) { alert("টাইটেল এবং ভিডিও লিংক অবশ্যই দিন!"); return; }

            const videoId = Date.now().toString();

            database.ref('videos/' + videoId).set({
                id: videoId,
                title: title,
                url: url,
                thumbnail: thumbnail || 'https://via.placeholder.com/400x225'
            }).then(() => {
                successMsg.classList.remove('hidden');
                document.getElementById('title').value = '';
                document.getElementById('url').value = '';
                document.getElementById('thumbnail').value = '';
                setTimeout(() => { successMsg.classList.add('hidden'); }, 3000);
            });
        }

        // ২. রিয়েলটাইম ডেটাবেজ থেকে তালিকা শো করা
        database.ref('videos').on('value', (snapshot) => {
            const grid = document.getElementById('admin-grid');
            const loadingText = document.getElementById('loading-text');
            grid.innerHTML = ""; 
            const data = snapshot.val();
            
            if (data) {
                loadingText.classList.add('hidden');
                Object.keys(data).forEach((key) => {
                    const video = data[key];
                    const card = `
                        <div class="bg-gray-50 p-3 rounded-2xl border border-gray-200 flex flex-col justify-between shadow-sm">
                            <div>
                                <img src="${video.thumbnail}" class="w-full aspect-video object-cover rounded-xl mb-2">
                                <h4 class="text-sm font-bold text-gray-800 line-clamp-2 leading-5 mb-3">${video.title}</h4>
                            </div>
                            <button onclick="deleteVideo('${key}')" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2 rounded-xl text-xs transition shadow-md">
                                ডিলিট করুন 🗑️
                            </button>
                        </div>
                    `;
                    grid.insertAdjacentHTML('afterbegin', card);
                });
            } else {
                loadingText.classList.remove('hidden');
                loadingText.innerText = "বর্তমানে ডেটাবেজে কোনো ভিডিও নেই!";
            }
        });

        // ৩. ভিডিও ডিলিট করা
        function deleteVideo(key) {
            if (confirm("ভিডিওটি ডিলিট করতে চান?")) {
                database.ref('videos/' + key).remove();
            }
        }

        // ৪. ওয়ানসিগন্যাল API এর মাধ্যমে সরাসরি নোটিফিকেশন পাঠানো
        async function sendNotification() {
            const notifTitle = document.getElementById('notif-title').value.trim();
            const notifBody = document.getElementById('notif-body').value.trim();

            if (!notifTitle || !notifBody) {
                alert("নোটিফিকেশনের টাইটেল এবং মেসেজ দুটিই লিখুন!");
                return;
            }

            if (ONESIGNAL_REST_KEY === "YOUR_ONESIGNAL_REST_API_KEY_HERE") {
                alert("দয়া করে কোডের ভেতর ওয়ানসিগন্যালের REST API Key টি বসান। তা না হলে নোটিফিকেশন যাবে না।");
                return;
            }

            // নোটিফিকেশন ডেটা অবজেক্ট তৈরি
            const notificationData = {
                app_id: ONESIGNAL_APP_ID,
                included_segments: ["All Subscribers"], // সমস্ত ইউজারের কাছে যাবে
                headings: { "en": notifTitle },
                contents: { "en": notifBody },
                // আপনি চাইলে এখানে আপনার মেইন সাইটের লিংক দিতে পারেন, যাতে ক্লিক করলে সাইট খোলে
                url: "https://your-github-username.github.io/repository-name/" 
            };

            try {
                const response = await fetch("https://onesignal.com/api/v1/notifications", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json; charset=utf-8",
                        "Authorization": `Basic ${ONESIGNAL_REST_KEY}`
                    },
                    body: JSON.stringify(notificationData)
                });

                const result = await response.json();

                if (response.ok) {
                    alert("🚀 ওয়ানসিগন্যাল নোটিফিকেশন সফলভাবে পাঠানো হয়েছে!");
                    document.getElementById('notif-title').value = "";
                    document.getElementById('notif-body').value = "";
                } else {
                    alert("ত্রুটি: " + (result.errors ? result.errors[0] : "পাঠানো যায়নি"));
                }
            } catch (err) {
                alert("নেটওয়ার্ক সমস্যা: " + err.message);
            }
        }
    </script>
</body>
</html>
