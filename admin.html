<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siam Video Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-2xl border border-gray-200">
        <h2 class="text-2xl font-bold mb-6 text-indigo-700 text-center uppercase tracking-wider">Add New Video (Firebase)</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">ভিডিওর টাইটেল</label>
                <input type="text" id="title" placeholder="যেমন: নতুন বাংলা মুভি" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">ভিডিও লিঙ্ক (YouTube/Facebook/Shorts)</label>
                <input type="text" id="vUrl" placeholder="লিঙ্কটি এখানে পেস্ট করুন" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">থাম্বনেইল লিঙ্ক (.jpg বা .png)</label>
                <input type="text" id="thumbUrl" placeholder="https://i.postimg.cc/..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <button onclick="addVideo()" id="btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg font-bold text-lg transition duration-300 shadow-md">
                ভিডিও আপলোড করুন
            </button>
        </div>
        
        <p id="msg" class="mt-4 text-center text-sm font-semibold"></p>
    </div>

    <script>
        // আপনার index.html থেকে নেওয়া ফায়ারবেস ডেটা
        const firebaseConfig = {
          apiKey: "AIzaSyBiVxBxExXHd2OqWa5LqZNE5a2t-6j1n9Y",
          authDomain: "sapp-38df8.firebaseapp.com",
          projectId: "sapp-38df8",
          storageBucket: "sapp-38df8.firebasestorage.app",
          messagingSenderId: "335406842966",
          appId: "1:335406842966:web:1cccf3395fb3e11460a7f7"
        };
        firebase.initializeApp(firebaseConfig);

        // ⚠️ আপনার ফায়ারবেস রিয়েলটাইম ডেটাবেজের লিংকটি নিচে বসাবেন (শেষে /videos.json অবশ্যই থাকবে)
        const DATABASE_URL = 'https://sapp-38df8-default-rtdb.firebaseio.com/videos.json';

        // লিঙ্ক অটোমেটিক ঠিক করার ফাংশন
        function fixLink(url) {
            if (url.includes("youtube.com/watch") || url.includes("youtu.be")) {
                let id = "";
                if(url.includes("v=")) {
                    id = url.split("v=")[1].split("&")[0];
                } else {
                    id = url.split("/").pop().split("?")[0];
                }
                return `https://www.youtube.com/embed/${id}`;
            }
            if (url.includes("youtube.com/shorts/")) {
                let id = url.split("shorts/")[1].split("?")[0];
                return `https://www.youtube.com/embed/${id}`;
            }
            if (url.includes("facebook.com")) {
                return `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=0`;
            }
            return url;
        }

        async function addVideo() {
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            const title = document.getElementById('title').value;
            const rawUrl = document.getElementById('vUrl').value;
            const thumb = document.getElementById('thumbUrl').value;

            if(!title || !rawUrl || !thumb) {
                alert("সবগুলো বক্স পূরণ করুন!");
                return;
            }

            btn.innerText = "প্রসেসিং হচ্ছে...";
            btn.disabled = true;
            msg.innerText = "";

            const finalUrl = fixLink(rawUrl);

            const newVideo = { 
                id: Date.now(), 
                title: title, 
                url: finalUrl, 
                thumbnail: thumb 
            };

            try {
                // সরাসরি ফায়ারবেস ডেটাবেজে পোস্ট করা হচ্ছে (কোনো গিটহাব টোকেন লাগবে না)
                const res = await fetch(DATABASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newVideo)
                });
                
                if(!res.ok) throw new Error("ডেটাবেজে কানেক্ট করা যাচ্ছে না!");
                
                msg.innerText = "🎉 ভিডিও সফলভাবে আপলোড হয়েছে!";
                msg.className = "mt-4 text-center text-sm font-semibold text-green-600";
                
                // ইনপুট বক্স খালি করা
                document.getElementById('title').value = "";
                document.getElementById('vUrl').value = "";
                document.getElementById('thumbUrl').value = "";

            } catch (error) {
                msg.innerText = "ভুল হয়েছে: " + error.message;
                msg.className = "mt-4 text-center text-sm font-semibold text-red-600";
            } finally {
                btn.innerText = "ভিডিও আপলোড করুন";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
