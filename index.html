<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>সবার আগে সিরিয়াল দেখুন Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; overflow-x: hidden; }
        .video-card { transition: transform .2s; cursor: pointer; }
        .video-card:active { transform: scale(0.98); }
        iframe, video { border-radius: 12px; width: 100%; height: 100%; position: absolute; inset: 0; }
        .premium-btn {
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        /* Pull to Refresh CSS */
        #ptr-element {
            position: fixed; top: -60px; left: 0; width: 100%; height: 60px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s ease; z-index: 100;
        }
        .ptr-icon {
            width: 35px; height: 35px; border: 3px solid #6366f1;
            border-top: 3px solid transparent; border-radius: 50%; display: none;
        }
        .spinning { display: block; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-section" class="fixed inset-0 bg-black z-[500] flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-gray-900 p-8 rounded-3xl border border-gray-800 shadow-2xl">
            <h2 id="auth-title" class="text-3xl font-extrabold text-indigo-500 text-center mb-6 uppercase tracking-widest">Rv Login</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="ইমেইল দিন" class="w-full p-4 rounded-xl bg-black border border-gray-800 outline-none focus:ring-2 focus:ring-indigo-600 text-white">
                <input type="password" id="password" placeholder="পাসওয়ার্ড দিন" class="w-full p-4 rounded-xl bg-black border border-gray-800 outline-none focus:ring-2 focus:ring-indigo-600 text-white">
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-indigo-600 py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition active:scale-95 shadow-lg shadow-indigo-500/20">প্রবেশ করুন</button>
                <p class="text-center text-sm text-gray-400">
                    <span id="auth-toggle-text">অ্যাকাউন্ট নেই?</span> 
                    <button onclick="toggleAuth()" id="auth-toggle-btn" class="text-indigo-500 font-bold ml-1">সাইন-আপ করুন</button>
                </p>
                <p id="auth-error" class="text-red-500 text-xs text-center mt-2 hidden"></p>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <div id="ptr-element">
            <div class="ptr-icon" id="loader-circle"></div>
            <span id="ptr-text" class="text-indigo-500 font-bold text-sm">↓ টানুন</span>
        </div>

        <div class="max-w-4xl mx-auto p-4">
            <header class="flex justify-between items-center py-6">
                <h1 class="text-3xl font-extrabold text-indigo-500 tracking-tighter">RIFAT <span class="text-white">STREAM</span></h1>
                
                <div class="flex items-center gap-3">
                    <a href="https://t.me/RvLiv_bot?start=ref" target="_blank" 
                       class="premium-btn text-black px-4 py-2 rounded-full font-bold text-xs md:text-sm flex items-center gap-2">
                        <span>💎</span> Use Pc Or Ios
                    </a>
                    <button onclick="logout()" class="text-gray-400 text-[10px] border border-gray-800 px-2 py-1 rounded-md uppercase">Logout</button>
                </div>
            </header>

            <div class="flex justify-center mb-6 min-h-[60px]">
                <iframe src="https://www.effectivecpmnetwork.com/gvegk3bs8?key=a141db84979b01ce894bcb8f026670c5" 
                        class="w-full max-w-[468px] h-[60px] rounded-lg border border-gray-800 bg-gray-900/50" 
                        frameborder="0" scrolling="no"></iframe>
            </div>

            <div class="relative mb-8">
                <input type="text" id="searchBox" onkeyup="search()" placeholder="ভিডিওর নাম দিয়ে খুঁজুন..." 
                       class="w-full p-4 pl-12 rounded-2xl bg-gray-900 border border-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-600 text-white">
                <span class="absolute left-4 top-4 text-gray-500">🔍</span>
            </div>
            
            <div id="grid" class="grid grid-cols-2 md:grid-cols-3 gap-5"></div>
        </div>
    </div>

    <div id="player" class="hidden fixed inset-0 bg-black/95 flex flex-col items-center justify-center z-[600] p-4">
        <div class="w-full max-w-4xl text-right">
            <button onclick="closePlayer()" class="bg-red-600 text-white px-6 py-2 rounded-full font-bold mb-3 shadow-lg active:scale-95 transition">বন্ধ করুন ✖</button>
            
            <div class="relative w-full aspect-video bg-black rounded-2xl overflow-hidden border border-gray-800 shadow-2xl mb-4" id="playerContainer"></div>
            
            <div class="text-left bg-gray-900/80 p-4 rounded-2xl border border-gray-800 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex-1">
                    <h2 id="playerVideoTitle" class="text-sm md:text-base font-bold text-gray-100 line-clamp-2 leading-6">ভিডিওর নাম</h2>
                    <p id="playerVideoViews" class="text-xs text-gray-500 mt-1">👁️ ০ ভিউজ</p>
                </div>
                
                <div class="flex items-center gap-2 justify-start md:justify-end">
                    <div class="bg-black border border-gray-800 rounded-xl flex items-center p-1">
                        <button id="likeBtn" class="flex items-center gap-1 hover:bg-gray-800 px-3 py-2 rounded-lg text-xs font-semibold text-gray-300 transition">
                            <span>👍</span> <span id="likeText">০</span>
                        </button>
                        <div class="w-[1px] h-5 bg-gray-800 mx-1"></div>
                        <button id="dislikeBtn" class="flex items-center gap-1 hover:bg-gray-800 px-3 py-2 rounded-lg text-xs font-semibold text-gray-300 transition">
                            <span>👎</span> <span id="dislikeText">০</span>
                        </button>
                    </div>
                    
                    <button id="playerDownloadBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-xs font-bold transition flex items-center gap-1">
                        📥 ডাউনলোড
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBiVxBxExXHd2OqWa5LqZNE5a2t-6j1n9Y",
          authDomain: "sapp-38df8.firebaseapp.com",
          databaseURL: "https://sapp-38df8-default-rtdb.firebaseio.com",
          projectId: "sapp-38df8",
          storageBucket: "sapp-38df8.firebasestorage.app",
          messagingSenderId: "335406842966",
          appId: "1:335406842966:web:1cccf3395fb3e11460a7f7"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let isLoginMode = true;
        let allVideos = [];
        let currentPlayingVideoId = null;

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Login" : "Sign Up";
            document.getElementById('auth-btn').innerText = isLoginMode ? "প্রবেশ করুন" : "অ্যাকাউন্ট খুলুন";
            document.getElementById('auth-toggle-btn').innerText = isLoginMode ? "সাইন-আপ করুন" : "লগিন করুন";
            document.getElementById('auth-error').classList.add('hidden');
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('auth-error');
            if(!email || !password) { alert("সব পূরণ করুন!"); return; }

            try {
                if (isLoginMode) {
                    await auth.signInWithEmailAndPassword(email, password);
                } else {
                    await auth.createUserWithEmailAndPassword(email, password);
                    alert("অ্যাকাউন্ট খোলা হয়েছে! এখন লগিন করুন।");
                    toggleAuth();
                }
            } catch (error) {
                errorEl.innerText = "ভুল ইমেইল অথবা পাসওয়ার্ড (কমপক্ষে ৬ অক্ষর)!";
                errorEl.classList.remove('hidden');
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                listenVideos(); 
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        function logout() { auth.signOut(); }

        let startY = 0;
        const ptrElement = document.getElementById('ptr-element');
        const loaderCircle = document.getElementById('loader-circle');
        const ptrText = document.getElementById('ptr-text');

        window.addEventListener('touchstart', (e) => {
            if (window.scrollY === 0) startY = e.touches[0].pageY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            const y = e.touches[0].pageY;
            const diff = y - startY;
            if (window.scrollY === 0 && diff > 0 && diff < 100) {
                ptrElement.style.transform = `translateY(${diff}px)`;
                ptrText.innerText = diff > 70 ? "ছেড়ে দিন" : "↓ টানুন";
            }
        }, { passive: true });

        window.addEventListener('touchend', async (e) => {
            const diff = e.changedTouches[0].pageY - startY;
            if (window.scrollY === 0 && diff > 70) {
                ptrText.innerText = "";
                loaderCircle.classList.add('spinning');
                database.ref('videos').once('value', (snapshot) => {
                    const data = snapshot.val();
                    if(data) {
                        allVideos = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                        display(allVideos);
                    }
                });
                setTimeout(() => { ptrElement.style.transform = `translateY(0)`; loaderCircle.classList.remove('spinning'); }, 500);
            } else { ptrElement.style.transform = `translateY(0)`; }
        });

        function listenVideos() {
            database.ref('videos').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    allVideos = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                    display(allVideos);
                    if(currentPlayingVideoId && data[currentPlayingVideoId]) {
                        updatePlayerStats(currentPlayingVideoId, data[currentPlayingVideoId]);
                    }
                }
            });
        }

        function getBaseStats(id) {
            if (!id) return { views: 300, likes: 50, dislikes: 0 };
            let hash = 0;
            for (let i = 0; i < id.length; i++) { hash = id.charCodeAt(i) + ((hash << 5) - hash); }
            const absHash = Math.abs(hash);
            return { views: 300 + (absHash % 701), likes: 50 + (absHash % 201), dislikes: absHash % 6 };
        }

        function display(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.length === 0 ? '<p class="text-center col-span-full py-10">কোনো ভিডিও নেই!</p>' : 
            data.map(v => {
                const base = getBaseStats(v.id);
                return `
                    <div class="video-card bg-gray-900 rounded-2xl overflow-hidden border border-gray-800 shadow-lg flex flex-col justify-between">
                        <div onclick="handleVideoClick('${v.url}', '${v.id}', '${v.title.replace(/'/g, "\\'")}')">
                            <img src="${v.thumbnail || 'https://via.placeholder.com/400x225'}" class="w-full aspect-video object-cover">
                            <div class="p-3">
                                <h3 class="text-xs font-bold line-clamp-2 h-10 leading-5 text-gray-200">${v.title}</h3>
                                <div class="flex items-center gap-3 text-[10px] text-gray-500 mt-2 font-medium">
                                    <span class="flex items-center gap-0.5">👁️ ${base.views + (v.views || 0)}</span>
                                    <span class="flex items-center gap-0.5">👍 ${base.likes + (v.likes || 0)}</span>
                                    <span class="flex items-center gap-0.5">👎 ${base.dislikes + (v.dislikes || 0)}</span>
                                </div>
                            </div>
                        </div>
                        <div class="px-3 pb-3">
                            <button onclick="downloadUniversal('${v.url}', '${v.title}')" class="w-full bg-indigo-600/20 hover:bg-indigo-600 border border-indigo-500/30 text-indigo-400 hover:text-white py-2 rounded-xl text-[11px] font-bold transition flex items-center justify-center gap-1">
                                📥 ডাউনলোড করুন
                            </button>
                        </div>
                    </div>
                `;
            }).reverse().join('');
        }

        function handleVideoClick(url, id, title) {
            const adLink = "https://www.effectivecpmnetwork.com/rkjwyym2?key=095428e760f406124cdacbfec12795b3";
            const hasClickedAd = sessionStorage.getItem('hasClickedAd');

            if (!hasClickedAd) {
                sessionStorage.setItem('pendingVideo', JSON.stringify({url, id, title}));
                sessionStorage.setItem('hasClickedAd', 'true');
                window.location.href = adLink; 
            } else {
                playVideo(url, id, title);
            }
        }

        window.addEventListener('load', function() {
            const pendingVideo = sessionStorage.getItem('pendingVideo');
            if (pendingVideo) {
                const video = JSON.parse(pendingVideo);
                playVideo(video.url, video.id, video.title);
                sessionStorage.removeItem('pendingVideo');
            }
        });

        function updatePlayerStats(id, videoData) {
            const base = getBaseStats(id);
            document.getElementById('playerVideoViews').innerText = `👁️ ${base.views + (videoData.views || 0)} ভিউজ`;
            document.getElementById('likeText').innerText = base.likes + (videoData.likes || 0);
            document.getElementById('dislikeText').innerText = base.dislikes + (videoData.dislikes || 0);
        }

        function getDriveId(url) {
            const regExp = /(?:https?:\/\/)?(?:drive\.google\.com\/(?:file\/d\/|open\?id=)|docs\.google\.com\/(?:file\/d\/))([a-zA-Z0-9_-]{25,})/;
            const match = url.match(regExp);
            return (match && match[1]) ? match[1] : null;
        }

        function getRumbleEmbedUrl(url) {
            // রুম্বেল লিঙ্ক ফরম্যাট ঠিক করার লজিক
            const match = url.match(/rumble\.com\/(?:embed\/|v[0-9]+-)?([a-zA-Z0-9]+)(?:-[a-zA-Z0-9]+)?\.html/);
            if (match && match[1]) return `https://rumble.com/embed/${match[1]}/`;
            return url.replace("rumble.com/", "rumble.com/embed/");
        }
        
        function getYoutubeId(url) {
            const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/ ]{11})/;
            const match = url.match(regExp);
            return (match && match[1]) ? match[1] : null;
        }

        function downloadUniversal(url, title) {
            const driveId = getDriveId(url);
            if (driveId) { 
                window.open(`https://docs.google.com/uc?export=download&id=${driveId}`, '_blank'); 
            } else if (url.includes("youtube.com") || url.includes("youtu.be")) {
                window.open(`https://en1.savefrom.net/1-youtube-video-downloader-19uO/?url=${encodeURIComponent(url)}`, '_blank');
            } else if (url.includes("rumble.com")) {
                // রুম্বেলের জন্য সেভফ্রম লিঙ্কে রিডাইরেক্ট
                window.open(`https://en1.savefrom.net/1-youtube-video-downloader-19uO/?url=${encodeURIComponent(url)}`, '_blank');
            } else {
                window.open(url, '_blank');
            }
        }

        function playVideo(url, id, title) {
            currentPlayingVideoId = id;
            document.getElementById('playerVideoTitle').innerText = title;
            document.getElementById('playerDownloadBtn').onclick = () => downloadUniversal(url, title);
            document.getElementById('likeBtn').onclick = () => handleLikeDislike(id, 'likes');
            document.getElementById('dislikeBtn').onclick = () => handleLikeDislike(id, 'dislikes');

            if(id && id !== 'undefined') { database.ref('videos/' + id + '/views').transaction(v => (v || 0) + 1); }

            const container = document.getElementById('playerContainer');
            let finalUrl = url;
            
            const ytId = getYoutubeId(url);
            if (ytId) {
                finalUrl = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
            } else if (url.includes("rumble.com")) {
                finalUrl = getRumbleEmbedUrl(url);
            } else if (getDriveId(url)) {
                finalUrl = `https://drive.google.com/file/d/${getDriveId(url)}/preview`;
            } else if (url.includes("facebook.com")) {
                finalUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&autoplay=1`;
            }

            container.innerHTML = `<iframe src="${finalUrl}" frameborder="0" allow="autoplay; encrypted-media; allowfullscreen" allowfullscreen></iframe>`;
            document.getElementById('player').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function handleLikeDislike(id, type) {
            if(id) { database.ref('videos/' + id + '/' + type).transaction(v => (v || 0) + 1); }
        }

        function closePlayer() {
            currentPlayingVideoId = null;
            document.getElementById('playerContainer').innerHTML = ""; 
            document.getElementById('player').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function search() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            display(allVideos.filter(v => v.title.toLowerCase().includes(q)));
        }
    </script>
</body>
</html>
